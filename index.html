<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fredj Moussa</title>

  <style>
    body {
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: black;
      font-size: 18px;
    }

    a:hover {
      color: red;
    }

    /* LEFT COLUMN: films list */
    .left {
      width: 250px;
      padding: 40px;
      box-sizing: border-box;
      position: relative;
      z-index: 2; /* on top of the images */
      background: #fff; /* optional: for contrast */
    }

    h1 {
      font-size: 18px;
      font-weight: normal;
      margin-bottom: 30px;
    }

    .films ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .films li {
      margin: 8px 0;
      position: relative;
      cursor: pointer;
    }

    /* RIGHT COLUMN: image preview */
    .preview {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .preview img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .films li:hover ~ .preview img[data-img="7sleepers"] {
      opacity: 1;
    }

    .films li:hover ~ .preview img[data-img="birdy"] {
      opacity: 1;
    }

    .films li:hover ~ .preview img[data-img="galactic"] {
      opacity: 1;
    }

    .films li:hover ~ .preview img[data-img="alienists"] {
      opacity: 1;
    }

    .films li:hover ~ .preview img[data-img="barbar"] {
      opacity: 1;
    }

    .films li:hover ~ .preview img[data-img="mirage"] {
      opacity: 1;
    }

    .films li:hover ~ .preview img[data-img="mascot"] {
      opacity: 1;
    }

    .films li:hover ~ .preview img[data-img="solar"] {
      opacity: 1;
    }

    footer {
      position: fixed;
      bottom: 40px;
      left: 40px;
      z-index: 3;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .left {
        width: 100%;
        padding: 20px;
        background: #fff;
      }

      .preview {
        height: 300px;
        margin-top: 10px;
      }

      .preview img {
        position: relative;
        width: 100%;
        height: 100%;
        opacity: 1;
      }

      footer {
        position: static;
        margin-top: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="left">
    <h1><a href="index.html">Fredj Moussa</a></h1>
    <div class="films">
      <ul>
        <li data-img="7sleepers"><a href="7sleepers.html">7 Sleepers – 2027</a></li>
        <li data-img="birdy"><a href="birdy.html">Birdy – 2027</a></li>
        <li data-img="galactic"><a href="galactic.html">Glactic Junkyard – 2026</a></li>
        <li data-img="alienists"><a href="alienists.html">The Alienists – 2026</a></li>
        <li data-img="barbar"><a href="barbar.html">Land of Barbar – 2025</a></li>
        <li data-img="mirage"><a href="mirage.html">Mirage, The Inner Sea – 2024</a></li>
        <li data-img="mascot"><a href="mascot.html">The Mascot – 2023</a></li>
        <li data-img="solar"><a href="solar.html">Solar Noon – 2022</a></li>
      </ul>
    </div>
  </div>

  <div class="preview">
    <img src="img/7sleepers.jpg" data-img="7sleepers">
    <img src="img/birdy.jpg" data-img="birdy">
    <img src="img/galactic.jpg" data-img="galactic">
    <img src="img/alienists.jpg" data-img="alienists">
    <img src="img/barbar.jpg" data-img="barbar">
    <img src="img/mirage.jpg" data-img="mirage">
    <img src="img/mascot.jpg" data-img="mascot">
    <img src="img/solarnoon.jpg" data-img="solar">
  </div>

  <footer>
    <a href="contact.html">Contact</a>
  </footer>

</body>
</html>
